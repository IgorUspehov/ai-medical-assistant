services:
  api:
    image: python:3.11-slim
    container_name: ai_medical_api
    working_dir: /app
    volumes:
      - ../app:/app
    command: bash -c "pip install fastapi uvicorn && uvicorn api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_medical_qdrant
    ports:
      - "6333:6333"

  postgres:
    image: postgres:16
    container_name: ai_medical_postgres
    environment:
      POSTGRES_DB: medical_ai
      POSTGRES_USER: medical_ai
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
